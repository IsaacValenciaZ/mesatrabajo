<div class="history-container">
  <div class="header">
    <h1>Historial de Tickets</h1>
  </div>

  <div class="date-group" *ngFor="let grupo of tickets">
    <div class="date-header">
      <span class="date-text">{{ grupo.fecha }}</span>
      <span class="report-count">{{ grupo.total }} informes</span>
    </div>

    <div class="cards-container">
      <div class="ticket-card" *ngFor="let item of grupo.items">
        <div class="card-row">
          <span class="time">{{ item.hora }}</span>
          <span class="user">{{ item.solicitante }}</span>
          <span class="dept">{{ item.depto }}</span>
          <span class="tech">Téc: {{ item.tecnico }}</span>
          <span class="problem">{{ item.problema }}</span>
          <span class="priority" [ngClass]="{'high': item.prioridad === 'Alta', 'mid': item.prioridad === 'Media'}">
            {{ item.prioridad }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
