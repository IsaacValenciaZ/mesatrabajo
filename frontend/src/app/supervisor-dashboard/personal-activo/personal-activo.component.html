<div class="panel-container">
  <div class="panel-header">
    <h2>Personal Activo</h2>
    <p>Listado del personal a tu cargo</p>
  </div>

  <div class="table-responsive">
    <table class="custom-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo Electrónico</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of personalList">
          <td>
            <div class="user-info">
              <div class="avatar-circle">{{ user.nombre.charAt(0) | uppercase }}</div>
              <span>{{ user.nombre }}</span>
            </div>
          </td>
          <td>{{ user.correo || user.email }}</td>
          <td>
            <span class="badge badge-personal">Personal</span>
          </td>
          <td>
            <button class="btn-action">Ver Desempeño</button>
          </td>
        </tr>
        <tr *ngIf="personalList.length === 0 && !loading">
          <td colspan="4" class="text-center">No se encontró personal activo.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>|
